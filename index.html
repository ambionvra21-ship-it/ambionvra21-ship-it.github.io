<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online BMI Calculator, Calorie Counter & Fitness Tools</title>
    
    <!-- Google Analytics Tracking -->
    <script async src="https://googletagmanager.com"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NGQGPEH0K4');
    </script>
    
    <!-- Google AdSense Activation with Auto Ads Enabled -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-9659641195994032">

    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0;
        }
        nav {
            background-color: #1e293b; color: white;
            padding: 1.25rem; text-align: center;
            font-size: 1.5rem; font-weight: bold;
        }
        .app-card {
            max-width: 500px; margin: 1.5rem auto;
            padding: 1.5rem; background: white;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #1e293b; font-size: 1.25rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f1f5f9; }
        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 600; color: #475569; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        button:active { background-color: #1d4ed8; }
        .result-display { margin-top: 1rem; padding: 0.75rem; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .list-items { margin-top: 1rem; padding-left: 1.25rem; }
    </style>
</head>
<body>

    <nav>Fitness Hub Online</nav>

    <!-- 1. BMI CALCULATOR WORKSPACE -->
    <div class="app-card">
        <h2>Body Mass Index (BMI) Calculator</h2>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g., 70">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="e.g., 175">
        </div>
        <button id="calculateBmiBtn">Calculate BMI</button>
        <div id="bmiResult" class="result-display"></div>
    </div>

    <!-- 2. WATER INTAKE TRACKER WORKSPACE -->
    <div class="app-card">
        <h2>Water Intake Tracker</h2>
        <div class="input-group">
            <label>Select Amount Consumed</label>
            <select id="waterAmount">
                <option value="250">Small Glass (250 ml)</option>
                <option value="500">Standard Bottle (500 ml)</option>
                <option value="750">Large Sports Bottle (750 ml)</option>
            </select>
        </div>
        <button id="addWaterBtn">Log Water Intake</button>
        <div id="waterResult" class="result-display" style="display:block; background:#e0f2fe; color:#0369a1;">Total logged today: 0 ml / 2500 ml goal</div>
    </div>
<!-- Fixed Ad Banner Between Trackers -->
<div style="text-align: center; margin: 1.5rem auto; max-width: 500px;">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-9659641195994032"
         data-ad-format="horizontal"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>


    <!-- 3. DIETARY CALORIE COUNTER WORKSPACE -->
    <div class="app-card">
        <h2>Dietary Calorie Counter</h2>
        <div class="input-group">
            <label>Food Item Name</label>
            <input type="text" id="foodName" placeholder="e.g., Apple">
        </div>
        <div class="input-group">
            <label>Calories (kcal)</label>
            <input type="number" id="calorieAmount" placeholder="e.g., 95">
        </div>
        <button id="addFoodBtn">Log Meal Item</button>
        <div id="dietResult" class="result-display" style="display:block; background:#f0fdf4; color:#166534;">Total Calories: 0 kcal</div>
        <ul id="foodList" class="list-items"></ul>
    </div>

    <script>
        document.getElementById("calculateBmiBtn").addEventListener("click", function() {
            var w = parseFloat(document.getElementById("weight").value);
            var hCm = parseFloat(document.getElementById("height").value);
            var res = document.getElementById("bmiResult");

            if (isNaN(w) || isNaN(hCm) || w <= 0 || hCm <= 0) {
                alert("Please input positive numbers for weight and height.");
                return;
            }

            var hM = hCm / 100;
            var score = (w / (hM * hM)).toFixed(1);
            var label = "", c = "";

            if (score < 18.5) { label = "Underweight"; c = "#eab308"; }
            else if (score < 25) { label = "Normal Weight"; c = "#22c55e"; }
            else if (score < 30) { label = "Overweight"; c = "#f97316"; }
            else { label = "Obese"; c = "#ef4444"; }

            res.style.backgroundColor = c;
            res.style.color = "#fff";
            res.style.display = "block";
            res.innerHTML = "Your BMI is: " + score + " (" + label + ")";
        });

        var waterSum = 0;
        document.getElementById("addWaterBtn").addEventListener("click", function() {
            waterSum += parseInt(document.getElementById("waterAmount").value);
            document.getElementById("waterResult").innerText = "Total logged today: " + waterSum + " ml / 2500 ml goal";
        });

        var calSum = 0;
        document.getElementById("addFoodBtn").addEventListener("click", function() {
            var meal = document.getElementById("foodName").value.trim();
            var kcal = parseInt(document.getElementById("calorieAmount").value);

            if(!meal || isNaN(kcal) || kcal <= 0) {
                alert("Please enter a valid meal name and calorie value.");
                return;
            }

            calSum += kcal;
            document.getElementById("dietResult").innerText = "Total Calories: " + calSum + " kcal";
            
            var li = document.createElement("li");
            li.innerText = meal + " - " + kcal + " kcal";
            document.getElementById("foodList").appendChild(li);
            
            document.getElementById("foodName").value = '';
            document.getElementById("calorieAmount").value = '';
        });
    </script>
</body>
</html>
