<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEARCH ENGINE OPTIMIZATION (SEO) META TAGS -->
    <title>Free Online BMI Calculator, Calorie Counter & Fitness Tools</title>
    <meta name="description" content="Calculate your Body Mass Index (BMI), track daily calorie intake goals, and monitor water consumption with our free online fitness tools. Fast, accurate, and easy to use.">
    <meta name="keywords" content="BMI calculator, free calorie counter, water intake tracker, health tools, weight loss calculator, fitness hub online">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://github.io">

    <!-- Google tag (gtag.js) -->
    <script async src="https://googletagmanager.com"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NGQGPEH0K4');

    <!-- GOOGLE ADSENSE CODE CONNECTED -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-9659641195994032">

    <!-- jQuery Library -->
    <script src="https://jquery.com"></script>
    
    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0;
            padding: 0;
        }
        nav {
            background-color: #1e293b;
            color: white;
            padding: 1.25rem;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #334155;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:active {
            background-color: #1d4ed8;
        }
        .result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <nav>Fitness Hub Online</nav>

    <div class="container">
        <div class="input-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g., 70" step="any">
        </div>
        
        <div class="input-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" placeholder="e.g., 175" step="any">
        </div>

        <button id="calculateBtn">Calculate BMI</button>

        <div id="result" class="result-box"></div>
    </div>

    <script>
        $(document).ready(function() {
            // "click touchstart" handles both desktop clicks and aggressive mobile screen taps
            $("#calculateBtn").on("click touchstart", function(e) {
                e.preventDefault();

                // Explicitly parse values to float numbers to fix the mobile calculation error
                let weight = parseFloat($("#weight").val());
                let heightCm = parseFloat($("#height").val());

                if (isNaN(weight) || isNaN(heightCm) || weight <= 0 || heightCm <= 0) {
                    alert("Please enter valid numbers for weight and height.");
                    return;
                }

                // Convert height from centimeters to meters
                let heightM = heightCm / 100;
                let bmi = weight / (heightM * heightM);
                bmi = bmi.toFixed(1); // Round to 1 decimal place

                let status = "";
                let bgColor = "";
                let textColor = "#fff";

                if (bmi < 18.5) {
                    status = "Underweight";
                    bgColor = "#eab308"; // Yellow
                } else if (bmi >= 18.5 && bmi < 24.9) {
                    status = "Normal Weight";
                    bgColor = "#22c55e"; // Green
                } else if (bmi >= 25 && bmi < 29.9) {
                    status = "Overweight";
                    bgColor = "#f97316"; // Orange
                } else {
                    status = "Obese";
                    bgColor = "#ef4444"; // Red
                }

                $("#result")
                    .css({ "background-color": bgColor, "color": textColor })
                    .html("Your BMI is: " + bmi + "<br>(" + status + ")")
                    .fadeIn();
            });
        });
    </script>

</body>
</html>
